a<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match or No Match</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#F8F6F3;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

.wrapper{
  width:100%;
  max-width:420px;
}

.top{
  display:flex;
  justify-content:space-around;
  margin:10px;
  font-size:16px;
}

.game{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.panel{
  width:130px;
  height:130px;
  background:white;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:5px;
}

.shape{
  width:30px;
  height:30px;
}

button{
  padding:7px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  color:white;
  font-size:13px;
}

.match{background:#e74c3c;}
.nomatch{background:#3498db;}

#msg{
  height:25px;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>Match or No Match</h2>

<div class="top">
  <div>Score: <span id="score">0</span></div>
  <div>Level: <span id="level">1</span></div>
</div>

<div class="game">
  <div class="panel" id="left"></div>
  <div class="panel" id="right"></div>
</div>

<button class="match" onclick="answer(true)">MATCH</button>
<button class="nomatch" onclick="answer(false)">NO MATCH</button>

<div id="msg"></div>
<div>Round: <span id="round">1</span>/15</div>

</div>

<script>

let score=0, level=1, round=1, wrong=0;
let isMatch=false, startTime=0, timer=null;

const shapes=["circle","triangle"];
const colors=["#E17055","#6C5CE7","#00B894","#FDCB6E"];

const left=document.getElementById("left");
const right=document.getElementById("right");
const msg=document.getElementById("msg");

let audioCtx=null;
function sound(freq){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();

  o.connect(g);
  g.connect(audioCtx.destination);

  o.frequency.value=freq;
  g.gain.value=0.05;

  o.start();
  o.stop(audioCtx.currentTime+0.15);
}

function shape(s,c){
  let d=document.createElement("div");

  if(s==="circle"){
    d.style.width="30px";
    d.style.height="30px";
    d.style.borderRadius="50%";
    d.style.background=c;
  }

  if(s==="triangle"){
    d.style.width="0";
    d.style.height="0";
    d.style.borderLeft="15px solid transparent";
    d.style.borderRight="15px solid transparent";
    d.style.borderBottom="30px solid "+c;
  }

  return d;
}

function pattern(){
  let arr=[];
  let count=(level===1)?1:(level===2)?2:(level===3)?4:(level===4)?6:8;

  for(let i=0;i<count;i++){
    arr.push({
      s:shapes[Math.floor(Math.random()*shapes.length)],
      c:colors[Math.floor(Math.random()*colors.length)]
    });
  }
  return arr;
}

function render(pan,p){
  pan.innerHTML="";
  if(p.length===1){
    pan.appendChild(shape(p[0].s,p[0].c));
    return;
  }
  let g=document.createElement("div");
  g.className="grid";
  p.forEach(x=>g.appendChild(shape(x.s,x.c)));
  pan.appendChild(g);
}

function clone(p){
  return JSON.parse(JSON.stringify(p));
}

function modify(p){
  let n=clone(p);
  let i=Math.floor(Math.random()*n.length);

  n[i]={
    s:shapes[Math.floor(Math.random()*shapes.length)],
    c:colors[Math.floor(Math.random()*colors.length)]
  };

  return n;
}

function getTime(){
  if(level===1) return 999999;
  if(level===2) return 6000;
  if(level===3) return 4000;
  return 3000;
}

function newRound(){

  if(round>15 || wrong>=5){
    endGame();
    return;
  }

  document.getElementById("round").innerText=round;
  document.getElementById("level").innerText=level;

  let base=pattern();
  isMatch=Math.random()>0.5;
  let other=isMatch?clone(base):modify(base);

  render(left,base);
  render(right,other);

  startTime=Date.now();

  clearTimeout(timer);
  timer=setTimeout(()=>{
    wrong++;
    feedback(false,true);
  },getTime());
}

function answer(user){
  clearTimeout(timer);
  sound(400);
  feedback(user===isMatch,false);
}

function feedback(correct,timeout){

  if(correct){
    score++;
    msg.innerText="Correct 😊";
    msg.style.color="green";
  }else{
    wrong++;
    msg.innerText="Try again";
    msg.style.color="red";
  }

  document.getElementById("score").innerText=score;

  round++;

  if(round>15){
    round=1;
    level++;
    if(level>6) level=6;
  }

  setTimeout(()=>{
    msg.innerText="";
    newRound();
  },600);
}
function endGame(){
  document.body.innerHTML=`
  <div>
    <h1>Game Over 🎮</h1>
    <h2>Score: ${score}</h2>
    <button onclick="location.reload()">Play Again</button>
  </div>`;
}

newRound();

</script>
</body>
</html>
