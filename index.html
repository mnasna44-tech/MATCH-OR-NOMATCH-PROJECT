<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match or No Match</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#F8F6F3;
  text-align:center;
}

.top {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.game {
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.panel {
  width:140px;
  height:140px;
  background:white;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:5px;
}

.shape { width:30px; height:30px; }
.circle { border-radius:50%; }

.triangle {
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#6C5CE7;
  color:white;
}

#msg {
  height:30px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Match or No Match</h2>

<div class="top">
  <div>Score: <span id="score">0</span></div>
  <div>Level: <span id="level">1</span></div>
</div>

<div class="game">
  <div class="panel" id="left"></div>
  <div class="panel" id="right"></div>
</div>

<button onclick="handleClick(true)">⬅ MATCH</button>
<button onclick="handleClick(false)">NO MATCH ➡</button>

<div id="msg"></div>
<div>Round: <span id="round">1</span>/15</div>

<script>

const SoundEngine = {
  ctx: null,

  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },

  playTone(start, end, duration) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();

    o.type = "sine";
    o.frequency.setValueAtTime(start, this.ctx.currentTime);
    o.frequency.linearRampToValueAtTime(end, this.ctx.currentTime + duration);

    g.gain.setValueAtTime(0.05, this.ctx.currentTime);

    o.connect(g);
    g.connect(this.ctx.destination);

    o.start();
    o.stop(this.ctx.currentTime + duration);
  },

  playReveal() {
    this.playTone(300, 300, 0.1);
  },

  playCorrect() {
    this.playTone(440, 660, 0.15);
  },

  playIncorrect() {
    this.playTone(330, 220, 0.2);
  },

  playClick() {
    this.playTone(800, 800, 0.02);
  },

  playLevelComplete() {
    const notes = [523, 659, 784];
    notes.forEach((f, i) => {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();

      o.frequency.value = f;
      g.gain.value = 0.05;

      o.connect(g);
      g.connect(this.ctx.destination);

      o.start(this.ctx.currentTime + i * 0.12);
      o.stop(this.ctx.currentTime + i * 0.12 + 0.12);
    });
  }
};

let score=0, level=1, round=1, wrong=0;
let isMatch=false, startTime=0;

const shapes=["circle","triangle"];
const colors=["#E17055","#6C5CE7","#00B894","#FDCB6E"];

const left=document.getElementById("left");
const right=document.getElementById("right");
const msg=document.getElementById("msg");

function shape(s,c){
  let d=document.createElement("div");
  d.className="shape";

  if(s==="circle"){
    d.classList.add("circle");
    d.style.background=c;
  }

  if(s==="triangle"){
    d.classList.add("triangle");
    d.style.borderBottomColor=c;
  }

  return d;
}
function pattern(){
  let arr=[];
  let count = level<=2?1:4;

  for(let i=0;i<count;i++){
    arr.push({
      s:shapes[Math.floor(Math.random()*shapes.length)],
      c:colors[Math.floor(Math.random()*colors.length)]
    });
  }
  return arr;
}

function render(p,patt){
  p.innerHTML="";
  if(patt.length===1){
    p.appendChild(shape(patt[0].s,patt[0].c));
  } else {
    let g=document.createElement("div");
    g.className="grid";
    patt.forEach(x=>g.appendChild(shape(x.s,x.c)));
    p.appendChild(g);
  }
}

function clone(p){ return JSON.parse(JSON.stringify(p)); }

function modify(p){
  let n=clone(p);
  let i=Math.floor(Math.random()*n.length);

  do{
    n[i].s=shapes[Math.floor(Math.random()*shapes.length)];
    n[i].c=colors[Math.floor(Math.random()*colors.length)];
  }while(n[i].s===p[i].s && n[i].c===p[i].c);

  return n;
}

function newRound(){

  if(wrong>=5){
    endGame();
    return;
  }
  if(round>15){
    level++;
    round=1;

    SoundEngine.playLevelComplete();
    showLevelMessage();
    return;
  }

  document.getElementById("round").innerText=round;
  document.getElementById("level").innerText=level;

  let base=pattern();
  isMatch=Math.random()>0.5;
  let other=isMatch?clone(base):modify(base);

  render(left,base);
  render(right,other);

  SoundEngine.playReveal(); // ✅ correct sound

  startTime=Date.now();
}

function handleClick(user){
  SoundEngine.init(); // 🔥 REQUIRED
  SoundEngine.playClick();
  answer(user);
}

function answer(user){
  let correct=(user===isMatch);

  if(correct){
    let t=(Date.now()-startTime)/1000;

    score+=2;

    if(t<2){
      score+=1;
    }

    SoundEngine.playCorrect();

    msg.innerText="Well done 😊";
    msg.style.color="green";

  } else {
    wrong++;
    SoundEngine.playIncorrect();

    msg.innerText="Good try 💛";
    msg.style.color="#E17055";
  }

  document.getElementById("score").innerText=score;

  round++;

  setTimeout(()=>{
    msg.innerText="";
    newRound();
  },800);
}

function endGame(){

  if(wrong<5){
    SoundEngine.playLevelComplete(); // ✅ final sound
  }

  let text = wrong>=5 ? "Let’s try again 😊" : "Well done 🎉";

  document.body.innerHTML=`
  <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;">
    <h1>${text}</h1>
    <h2>Score: ${score}</h2>
    <button onclick="location.reload()">Play Again</button>
  </div>`;
}
function showLevelMessage(){
  msg.innerText="Level"+level+"🎉";
  msg.style.color="#00B894";

  setTimeout(()=>{
    msg.innerText="";
    newRound();
  },1500);
}
document.addEventListener("keydown",e=>{
  SoundEngine.init();
  if(e.key==="ArrowLeft"){ SoundEngine.playClick(); answer(true); }
  if(e.key==="ArrowRight"){ SoundEngine.playClick(); answer(false); }
});

newRound();

</script>

</body>
</html>
